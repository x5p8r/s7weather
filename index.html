<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S7 Weather - طقس غازي عنتاب والعالم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logo.jpeg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="theme-color" content="#0a0b10">
    <meta name="monetag" content="00a4cd2530256ebd11e5b41473c0178e">

<body>
    <div class="container">
        <header>
            <div class="logo">S7 <span>STUDIO</span></div>
            <h1>تطبيق الطقس</h1>
            <p>ابحث عن أي مدينة في العالم</p>
        </header>
        <script src="https://5gvci.com/act/files/tag.min.js?z=10822440" data-cfasync="false" async></script>

        <div class="ad-space"><script src="https://5gvci.com/act/files/tag.min.js?z=10822440" data-cfasync="false" async></script></div>

        <div class="search-box">
            <input type="text" id="city-input" placeholder="مثال: غازي عنتاب، إسطنبول...">
            <button id="search-btn">بحث</button>
        </div>

        <button id="geo-btn" class="geo-button">📍 موقعي الحالي</button>

        <div class="weather-card" id="weather-card">

                <div class="welcome-msg">
                    <img src="https://cdn-icons-png.flaticon.com/512/4052/4052984.png" alt="weather" width="80">

                    <p>أدخل اسم المدينة أو اضغط "موقعي" لمعرفة الطقس</p>
                </div>
            </div>
        </div>

        <div class="ad-space"><script>(function(s){s.dataset.zone='10822451',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script></div>
        
        <footer>
            <p>تم التطوير بواسطة S7 Studio &copy; 2026</p>
        </footer>
